name: Publish CLI

on:
  push:
    branches: [main]
    paths: ['cli/**']

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish if version changed
        run: |
          PKG=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          EXACT=$(npm view "$PKG@$CURRENT" version 2>/dev/null || echo "")
          if [ "$EXACT" = "$CURRENT" ]; then
            echo "v$CURRENT is already published — skipping."
          else
            echo "Publishing $PKG@$CURRENT"
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
